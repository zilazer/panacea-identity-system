<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Entry point for panacea and the independent 3D preview." />
    <link rel="icon" href="assets/logo/current/panacea-icon-a-current.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="assets/site/css/base.css" />
    <title>panacea.design.system.v0.1</title>
    <style>
      body {
        min-height: 100vh;
      }

      .entry {
        min-height: 100vh;
        align-content: center;
        row-gap: 80px;
      }

      .entry__title {
        grid-column: 1 / 12;
        margin: 0;
        max-width: 1060px;
        font-size: clamp(40px, 6vw, 72px);
        line-height: 0.92;
        font-weight: 500;
        overflow-wrap: anywhere;
      }

      .entry__links {
        grid-column: 2 / 7;
        display: grid;
        gap: 8px;
        border-top: 1px solid var(--line);
      }

      .entry__links a {
        display: grid;
        grid-template-columns: 96px 1fr;
        gap: 24px;
        min-height: 72px;
        align-items: center;
        border-bottom: 1px solid var(--line);
      }

      .entry__links span {
        color: var(--muted);
      }

      @media (max-width: 900px) {
        .entry__title,
        .entry__links {
          grid-column: 1 / -1;
        }
      }
    </style>
  </head>
  <body>
    <main class="entry page-grid">
      <h1 class="entry__title">panacea.design.system.v0.1</h1>
      <nav class="entry__links" aria-label="Site entries">
        <a href="panacea.html"><span>01</span><strong>panacea</strong></a>
        <a href="3d-preview.html"><span>02</span><strong>3D Preview</strong></a>
      </nav>
    </main>
  </body>
</html>

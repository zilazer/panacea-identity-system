<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Panacea Architectural Type System: an interactive architectural alphabet lattice and font specimen tool."
    />
    <title>panacea.architectural.type.system.v0.6</title>
    <link rel="icon" href="assets/logo/current/panacea-icon-a-current.svg" type="image/svg+xml" />
    <style>
      @font-face {
        font-family: "Panacea Architectural";
        src: url("assets/font/PanaceaArchitectural-Regular.ttf?v=0.4.0") format("truetype");
        font-style: normal;
        font-weight: 400;
        font-display: block;
      }

      :root {
        --paper: #f5f5f2;
        --ink: #111111;
        --muted: #6f6f6a;
        --line: #111111;
        --soft-line: rgba(17, 17, 17, 0.28);
        --unit: 8px;
        --ease: cubic-bezier(0.5, 0, 0, 0.75);
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        background: var(--paper);
        color: var(--ink);
        font-family: Inter, "IBM Plex Sans", Arial, Helvetica, "PingFang SC", "Hiragino Sans GB", sans-serif;
        font-size: 14px;
        line-height: 1.45;
      }

      button {
        border: 0;
        border-radius: 0;
        padding: 0;
        background: transparent;
        color: inherit;
        font: inherit;
        text-align: left;
        cursor: pointer;
      }

      img {
        display: block;
        width: 100%;
      }

      .page {
        min-height: 100vh;
      }

      .hero {
        position: relative;
        min-height: min(64vw, 820px);
        overflow: hidden;
        border-bottom: 1px solid var(--line);
        background: #d6d8da;
      }

      .hero img {
        width: 100%;
        height: 100%;
        min-height: min(64vw, 820px);
        object-fit: cover;
      }

      .hero__heading {
        position: absolute;
        top: 40px;
        left: 48px;
        z-index: 1;
        max-width: min(760px, calc(100% - 96px));
        margin: 0;
        color: #ffffff;
        font-family: "Panacea Architectural", sans-serif;
        font-size: clamp(36px, 5vw, 82px);
        font-weight: 400;
        line-height: 1.05;
      }

      .lattice-wrap {
        border-bottom: 1px solid var(--line);
      }

      .lattice {
        display: grid;
        grid-template-columns: repeat(6, minmax(0, 1fr));
        background: var(--line);
        gap: 1px;
      }

      .tile {
        --tile-brightness: 0.8;
        display: grid;
        grid-template-columns: 56px minmax(0, 1fr);
        min-height: 250px;
        overflow: hidden;
        background: var(--paper);
        filter: brightness(var(--tile-brightness));
        transition: filter 180ms var(--ease), box-shadow 180ms var(--ease);
      }

      .tile:hover,
      .tile:focus-visible {
        --tile-brightness: 1;
        outline: none;
        box-shadow: inset 0 0 0 2px var(--ink);
      }

      .tile__glyph {
        display: grid;
        place-items: center;
        min-width: 0;
        padding: 16px 8px;
        border-right: 1px solid var(--soft-line);
      }

      .tile__glyph-char {
        font-family: "Panacea Architectural", sans-serif;
        font-size: 58px;
        line-height: 1;
      }

      .tile__image {
        min-width: 0;
        height: 100%;
      }

      .tile__image img {
        height: 100%;
        object-fit: cover;
      }

      .lattice-footer {
        grid-column: span 1;
        display: grid;
        place-items: center;
        min-height: 250px;
        padding: 24px;
        background: #f8f8f5;
        border: 0;
        cursor: pointer;
      }

      .lattice-footer:hover,
      .lattice-footer:focus-visible {
        outline: none;
        box-shadow: inset 0 0 0 2px var(--ink);
      }

      .lattice-footer__identity {
        display: grid;
        justify-items: center;
        gap: 12px;
        width: min(220px, 86%);
      }

      .lattice-footer__logo {
        position: relative;
        width: 100%;
        aspect-ratio: 1446 / 593;
        overflow: hidden;
      }

      .lattice-footer__logo img {
        position: absolute;
        top: -88.2%;
        left: -20.263%;
        width: 153.389%;
        max-width: none;
      }

      .lattice-footer__subtitle {
        margin: 0;
        color: var(--muted);
        font-size: clamp(8px, 0.85vw, 12px);
        line-height: 1;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      .lattice-spacer {
        grid-column: span 3;
        min-height: 250px;
        background: #f8f8f5;
      }

      .font-overlay {
        position: fixed;
        inset: 0;
        z-index: 70;
        display: grid;
        place-items: center;
        padding: clamp(24px, 5vw, 80px);
        background: rgba(245, 245, 242, 0.28);
        opacity: 0;
        pointer-events: none;
        transition: opacity 180ms var(--ease);
      }

      .font-overlay.is-open {
        opacity: 1;
        pointer-events: auto;
      }

      .font-modal {
        position: relative;
        display: grid;
        gap: 24px;
        width: min(1440px, 100%);
        max-height: 100%;
        padding: 32px;
        overflow: auto;
        border: 1px solid var(--line);
        background: var(--paper);
        box-shadow: 0 24px 80px rgba(17, 17, 17, 0.22);
      }

      .font-modal__close {
        position: absolute;
        top: 18px;
        right: 18px;
        width: 40px;
        height: 40px;
        display: grid;
        place-items: center;
        border: 1px solid var(--line);
        background: var(--paper);
        font-size: 24px;
        line-height: 1;
      }

      .font-modal__close:hover,
      .font-modal__close:focus-visible {
        outline: none;
        background: var(--ink);
        color: var(--paper);
      }

      .font-modal__heading {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 24px;
        padding-right: 56px;
      }

      .font-modal__heading label {
        font-size: clamp(22px, 2.2vw, 34px);
        font-weight: 600;
      }

      .font-modal__heading span,
      .font-modal__status {
        color: var(--muted);
        font-size: 14px;
      }

      .font-modal textarea {
        width: 100%;
        min-height: 310px;
        resize: none;
        padding: 48px;
        border: 1px solid var(--line);
        border-radius: 0;
        outline: none;
        background: transparent;
        color: var(--ink);
        font-family: "Panacea Architectural", sans-serif;
        font-size: clamp(72px, 8.5vw, 142px);
        line-height: 1.15;
        white-space: pre-wrap;
        overflow-wrap: break-word;
      }

      .font-modal textarea:focus {
        box-shadow: inset 0 0 0 1px var(--line);
      }

      .font-modal__actions {
        display: flex;
        flex-wrap: wrap;
        align-items: flex-start;
        gap: 16px;
      }

      .font-modal__button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 56px;
        padding: 0 28px;
        border: 1px solid var(--line);
        background: transparent;
        color: var(--ink);
        font-size: 18px;
      }

      .font-modal__button:hover,
      .font-modal__button:focus-visible {
        outline: none;
        background: var(--ink);
        color: var(--paper);
      }

      .font-modal__button:disabled {
        cursor: not-allowed;
        opacity: 0.4;
      }

      .font-modal__status {
        min-height: 56px;
        display: inline-flex;
        align-items: center;
        margin-left: auto;
      }

      .overlay {
        position: fixed;
        inset: 0;
        z-index: 50;
        display: grid;
        place-items: center;
        padding: clamp(24px, 5vw, 80px);
        background: rgba(245, 245, 242, 0.18);
        opacity: 0;
        pointer-events: none;
        transition: opacity 180ms var(--ease);
      }

      .overlay.is-open {
        opacity: 1;
        pointer-events: auto;
      }

      .detail {
        display: grid;
        grid-template-columns: 48fr 52fr;
        width: 100%;
        height: 100%;
        border: 1px solid var(--line);
        background: var(--paper);
        box-shadow: 0 24px 80px rgba(17, 17, 17, 0.2);
        cursor: zoom-out;
      }

      .detail__glyph {
        position: relative;
        display: grid;
        place-items: center;
        overflow: hidden;
        border-right: 1px solid var(--line);
        background-color: rgba(255, 255, 255, 0.36);
        background-image:
          linear-gradient(to right, rgba(17, 17, 17, 0.36) 1px, transparent 1px),
          linear-gradient(to bottom, rgba(17, 17, 17, 0.36) 1px, transparent 1px);
        background-size: 32px 32px;
      }

      .detail__glyph::before,
      .detail__glyph::after {
        content: "";
        position: absolute;
        background: var(--line);
        opacity: 0.7;
      }

      .detail__glyph::before {
        width: 1px;
        height: 100%;
        left: 50%;
      }

      .detail__glyph::after {
        width: 100%;
        height: 1px;
        top: 50%;
      }

      .detail__glyph span {
        position: relative;
        z-index: 1;
        font-family: "Panacea Architectural", sans-serif;
        font-size: clamp(220px, 30vw, 520px);
        line-height: 1;
      }

      .detail__figure {
        display: grid;
        grid-template-rows: 1fr auto;
        min-width: 0;
        margin: 0;
        background: #d5d7d9;
      }

      .detail__image {
        position: relative;
        min-height: 0;
      }

      .detail__image img {
        height: 100%;
        object-fit: cover;
      }

      .detail__version {
        position: absolute;
        top: 32px;
        right: 80px;
        font-weight: 600;
      }

      .detail__caption {
        display: flex;
        justify-content: space-between;
        gap: 24px;
        padding: 16px 24px;
        border-top: 1px solid var(--line);
        background: var(--paper);
        font-size: 14px;
        line-height: 1.25;
      }

      .detail__caption strong {
        font-weight: 700;
      }

      .detail__caption span {
        text-align: right;
      }

      @media (max-width: 1100px) {
        .hero {
          min-height: 72vh;
        }

        .hero img {
          min-height: 72vh;
        }

        .hero__heading {
          top: 24px;
          left: 24px;
          max-width: calc(100% - 48px);
        }

        .lattice {
          grid-template-columns: repeat(2, minmax(260px, 1fr));
          overflow-x: auto;
        }

        .tile {
          min-height: 220px;
        }

        .lattice-footer {
          grid-column: 1 / -1;
          grid-template-columns: 1fr;
          align-items: start;
          min-height: 192px;
          padding: 32px 24px;
        }

        .lattice-footer__identity {
          width: min(420px, 86%);
        }

        .lattice-spacer {
          display: none;
        }

        .font-modal {
          padding: 24px;
        }

        .font-modal__heading {
          align-items: flex-start;
          flex-direction: column;
        }

        .font-modal textarea {
          min-height: 220px;
          padding: 24px;
          font-size: 64px;
        }

        .font-modal__status {
          width: 100%;
          margin-left: 0;
        }

        .detail {
          grid-template-columns: 1fr;
        }

        .detail__glyph {
          min-height: 72vw;
          border-right: 0;
          border-bottom: 1px solid var(--line);
        }

        .detail__figure {
          min-height: 72vw;
        }

        .detail__image img {
          aspect-ratio: 3 / 2;
        }

        .detail__version {
          top: 20px;
          right: 24px;
        }

        .detail__caption {
          align-items: flex-start;
          flex-direction: column;
        }

        .detail__caption span {
          text-align: left;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="hero" aria-labelledby="page-title">
        <img src="assets/type/panacea-architectural-reference.png" alt="Repeated concrete structural bays in dense fog" />
        <h1 class="hero__heading" id="page-title">Panacea Architectural Type System</h1>
      </section>

      <section class="lattice-wrap" aria-label="Architectural alphabet lattice">
        <div class="lattice" id="alphabet-lattice"></div>
      </section>

      <div class="overlay" id="alphabet-overlay" aria-hidden="true">
        <section class="detail" id="alphabet-detail" aria-live="polite" role="dialog" aria-modal="true" aria-label="Architectural alphabet detail">
          <div class="detail__glyph" aria-hidden="true">
            <span id="detail-glyph">a</span>
          </div>
          <figure class="detail__figure">
            <div class="detail__image">
              <img id="detail-image" src="assets/architectural-alphabet/photos/a-single-portal.png" alt="Single concrete portal in dense winter fog" />
              <span class="detail__version">v0.6.0</span>
            </div>
            <figcaption class="detail__caption">
              <strong id="detail-title">a · Portal / 门洞</strong>
              <span id="detail-caption">Single portal factory / 单门厂房</span>
            </figcaption>
          </figure>
        </section>
      </div>

      <div class="font-overlay" id="font-overlay" aria-hidden="true">
        <section class="font-modal" role="dialog" aria-modal="true" aria-labelledby="font-modal-title">
          <button class="font-modal__close" id="font-modal-close" type="button" aria-label="Close font tester">×</button>
          <div class="font-modal__heading">
            <label id="font-modal-title" for="font-preview-input">Type specimen / 输入文字</label>
            <span>A-Z · a-z · Space · , . ? · Line break</span>
          </div>
          <textarea id="font-preview-input" rows="2" wrap="soft" spellcheck="false">panacea,
form?</textarea>
          <div class="font-modal__actions">
            <button class="font-modal__button" id="export-font-png" type="button">Export transparent PNG / 导出透明 PNG</button>
            <button class="font-modal__button" id="export-font-svg" type="button">Export SVG / 导出 SVG</button>
            <a class="font-modal__button" href="assets/font/PanaceaArchitectural-Regular.ttf?v=0.4.0" download="PanaceaArchitectural-Regular.ttf">Download TTF / 下载字体</a>
            <output class="font-modal__status" id="font-export-status" for="font-preview-input" aria-live="polite"></output>
          </div>
        </section>
      </div>
    </main>

    <script>
      const entries = [
        ["a", "Portal / 门洞", "Single portal factory / 单门厂房", "portal", "assets/architectural-alphabet/photos/a-single-portal.png", "Single concrete portal in dense winter fog"],
        ["b", "Elevator shaft / 电梯井", "Warehouse + vertical core / 仓库与竖向核心", "core", "assets/architectural-alphabet/photos/b-warehouse-elevator-shaft.png", "Concrete warehouse with external elevator shaft"],
        ["c", "Open wall / 开放折墙", "L-shaped enclosure / L 型围合", "wall", "assets/architectural-alphabet/photos/c-open-folded-wall.png", "Open L-shaped concrete wall"],
        ["d", "Vertical core / 核心筒", "Factory body + core / 厂房主体与核心筒", "volume", "assets/architectural-alphabet/photos/d-factory-vertical-core.png", "Factory with vertical concrete core"],
        ["e", "Cantilever / 挑板", "Horizontal concrete projection / 水平混凝土悬挑", "ledge", "assets/architectural-alphabet/photos/e-cantilever-slab.png", "Brutalist concrete cantilever slab"],
        ["f", "Canopy / 雨棚", "Roof without building / 没有下部的屋檐", "canopy", "assets/architectural-alphabet/photos/f-industrial-canopy.png", "Minimal industrial concrete canopy"],
        ["g", "Underground ramp / 地下坡道", "Factory descending below grade / 厂房向地下延伸", "ramp", "assets/architectural-alphabet/photos/g-underground-ramp-factory.png", "Concrete factory with underground ramp"],
        ["h", "Colonnade / 双柱柱廊", "Two columns + long roof / 双柱与长屋顶", "colonnade", "assets/architectural-alphabet/photos/h-double-column-colonnade.png", "Double-column concrete colonnade"],
        ["i", "Tower / 塔", "The quietest structure / 最安静的结构", "tower", "assets/architectural-alphabet/photos/i-concrete-tower.png", "Solitary concrete tower in fog"],
        ["j", "Bent tower / 折塔", "Signal tower disappearing in fog / 消失于雾中的信号塔", "mast", "assets/architectural-alphabet/photos/j-bent-signal-tower.png", "Bent concrete signal tower"],
        ["k", "Fire stair / 消防楼梯", "Vertical circulation + platform / 垂直交通与平台", "stair", "assets/architectural-alphabet/photos/k-industrial-fire-stair.png", "Industrial fire stair and connecting platform"],
        ["l", "Corner / 转角", "90-degree concrete wall / 90 度混凝土墙", "corner", "assets/architectural-alphabet/photos/l-concrete-corner.png", "Ninety-degree concrete factory corner"],
        ["m", "Three bays / 三跨", "Repeated factory rhythm / 连续厂房节奏", "triple bay", "assets/architectural-alphabet/photos/m-three-bay-factory.png", "Three-bay concrete factory receding into fog"],
        ["n", "Two bays / 双跨", "A shorter structural rhythm / 更短的结构节奏", "double bay", "assets/architectural-alphabet/photos/n-two-bay-factory.png", "Two-bay concrete factory receding into fog"],
        ["o", "Courtyard / 天井", "A square opening to the sky / 通向天空的方形开口", "courtyard", "assets/architectural-alphabet/photos/o-square-courtyard.png", "Square concrete courtyard and open sky"],
        ["p", "Ramp warehouse / 坡道仓库", "Freight opening + transport ramp / 货运口与运输坡道", "platform", "assets/architectural-alphabet/photos/p-ramp-warehouse.png", "Concrete ramp warehouse"],
        ["q", "Sunken court / 地下庭院", "Courtyard + underground route / 庭院与地下车道", "sunken", "assets/architectural-alphabet/photos/q-sunken-courtyard.png", "Sunken courtyard with underground driveway"],
        ["r", "Gatehouse / 门卫室", "Column + compact canopy / 立柱与紧凑挑檐", "pavilion", "assets/architectural-alphabet/photos/r-gatehouse.png", "Minimal concrete gatehouse"],
        ["s", "Folded wall / 连续折墙", "Space drawn by one wall / 一面墙画出的空间", "fold", "assets/architectural-alphabet/photos/s-continuous-folded-wall.png", "Continuous folded concrete wall"],
        ["t", "Landmark tower / 地标塔", "The series' vertical marker / 系列中的垂直地标", "beacon", "assets/architectural-alphabet/photos/t-landmark-tower-crossbeam.png", "Concrete landmark tower with crossbeam"],
        ["u", "Enclosed court / 围合庭院", "Three walls + standing water / 三面墙与积水", "courtyard", "assets/architectural-alphabet/photos/u-three-sided-courtyard.png", "Three-sided concrete courtyard"],
        ["v", "Concrete canyon / 混凝土峡谷", "Two walls converge / 两面折墙汇聚", "valley", "assets/architectural-alphabet/photos/v-concrete-canyon.png", "Concrete walls forming a canyon"],
        ["w", "Colonnade group / 四跨柱廊群", "Series cover / 系列封面", "colonnade", "assets/architectural-alphabet/photos/w-colonnade-group.png", "Four-bay concrete colonnade disappearing into fog"],
        ["x", "Structural node / 结构节点", "Crossed steel + bolted plate / 交叉钢梁与螺栓板", "node", "assets/architectural-alphabet/photos/x-crossed-structural-joint.png", "Crossed steel beams and bolted structural joint"],
        ["y", "Transport tower / 运输塔", "Chimney + conveyor bridge / 烟囱与运输桥", "yardarm", "assets/architectural-alphabet/photos/y-transport-tower-bridge.png", "Concrete chimney with elevated transport bridge"],
        ["z", "Switchback ramp / 折返坡道", "Continuous circulation + roof / 连续坡道与屋顶", "zigzag", "assets/architectural-alphabet/photos/z-switchback-ramp-roof.png", "Switchback concrete ramp under a roof"]
      ];

      const lattice = document.querySelector("#alphabet-lattice");
      const detail = {
        glyph: document.querySelector("#detail-glyph"),
        image: document.querySelector("#detail-image"),
        title: document.querySelector("#detail-title"),
        caption: document.querySelector("#detail-caption"),
        section: document.querySelector("#alphabet-detail"),
        overlay: document.querySelector("#alphabet-overlay")
      };
      const fontModal = {
        overlay: document.querySelector("#font-overlay"),
        close: document.querySelector("#font-modal-close"),
        input: document.querySelector("#font-preview-input"),
        exportPng: document.querySelector("#export-font-png"),
        exportSvg: document.querySelector("#export-font-svg"),
        status: document.querySelector("#font-export-status")
      };
      const FONT_FAMILY = "Panacea Architectural";
      const FONT_URL = "assets/font/PanaceaArchitectural-Regular.ttf?v=0.4.0";
      const FONT_SIZE = 240;
      const LINE_HEIGHT = 300;
      const EXPORT_PADDING = 80;
      const EXPORT_SCALE = 2;
      let fontDataUriPromise;

      function renderTile(entry) {
        const [glyph, archetype, caption, keyword, image, alt] = entry;
        const tile = document.createElement("button");
        tile.className = "tile";
        tile.type = "button";
        tile.dataset.glyph = glyph;
        tile.setAttribute("aria-label", `${glyph} ${archetype} ${caption}`);
        tile.innerHTML = `
          <span class="tile__glyph">
            <span class="tile__glyph-char">${glyph}</span>
          </span>
          <span class="tile__image"><img src="${image}" alt="${alt}" loading="lazy"></span>
        `;
        tile.addEventListener("click", () => selectEntry(entry, true));
        return tile;
      }

      function renderFooter() {
        const footer = document.createElement("button");
        footer.className = "lattice-footer";
        footer.type = "button";
        footer.setAttribute("aria-label", "Open Panacea font tester");
        footer.innerHTML = `
          <div class="lattice-footer__identity">
            <div class="lattice-footer__logo">
              <img src="assets/logo/current/panacea-master-solid-current.png" alt="panacea" loading="lazy">
            </div>
            <p class="lattice-footer__subtitle">Architectural Alphabet</p>
          </div>
        `;
        footer.addEventListener("click", openFontModal);
        return footer;
      }

      function selectEntry(entry, shouldScroll) {
        const [glyph, archetype, caption, , image, alt] = entry;
        detail.glyph.textContent = glyph;
        detail.image.src = image;
        detail.image.alt = alt;
        detail.title.textContent = `${glyph} · ${archetype}`;
        detail.caption.textContent = caption;
        history.replaceState(null, "", `#alphabet-${glyph}`);
        if (shouldScroll) {
          openOverlay();
        }
      }

      function openOverlay() {
        detail.overlay.classList.add("is-open");
        detail.overlay.setAttribute("aria-hidden", "false");
      }

      function closeOverlay() {
        detail.overlay.classList.remove("is-open");
        detail.overlay.setAttribute("aria-hidden", "true");
      }

      function openFontModal() {
        fontModal.overlay.classList.add("is-open");
        fontModal.overlay.setAttribute("aria-hidden", "false");
        requestAnimationFrame(() => fontModal.input.focus());
      }

      function closeFontModal() {
        fontModal.overlay.classList.remove("is-open");
        fontModal.overlay.setAttribute("aria-hidden", "true");
      }

      function updateFontButtons() {
        const isEmpty = fontModal.input.value.length === 0;
        fontModal.exportPng.disabled = isEmpty;
        fontModal.exportSvg.disabled = isEmpty;
        if (!isEmpty) fontModal.status.textContent = "";
      }

      function safeFilename(text, extension) {
        const compact = text
          .trim()
          .replace(/\s+/g, "-")
          .replace(/[^a-zA-Z-]/g, "")
          .slice(0, 40);
        return compact ? `panacea-${compact}.${extension}` : `panacea-type.${extension}`;
      }

      async function getExportMetrics(text) {
        await document.fonts.load(`${FONT_SIZE}px "${FONT_FAMILY}"`);
        const lines = text.split("\n");
        const canvas = document.createElement("canvas");
        const context = canvas.getContext("2d");
        context.font = `${FONT_SIZE}px "${FONT_FAMILY}"`;
        const maxLineWidth = Math.max(...lines.map((line) => context.measureText(line || " ").width));
        const textHeight = FONT_SIZE * 1.11 + Math.max(0, lines.length - 1) * LINE_HEIGHT;
        const logicalWidth = Math.ceil(maxLineWidth + EXPORT_PADDING * 2);
        const logicalHeight = Math.ceil(textHeight + EXPORT_PADDING * 2);
        const firstBaseline = EXPORT_PADDING + FONT_SIZE * 0.85;
        return { lines, logicalWidth, logicalHeight, firstBaseline };
      }

      function setExportDisabled(isDisabled) {
        fontModal.exportPng.disabled = isDisabled;
        fontModal.exportSvg.disabled = isDisabled;
      }

      function downloadBlob(blob, filename) {
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = filename;
        link.click();
        URL.revokeObjectURL(url);
      }

      function escapeXml(text) {
        return text
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function arrayBufferToBase64(buffer) {
        const bytes = new Uint8Array(buffer);
        let binary = "";
        bytes.forEach((byte) => {
          binary += String.fromCharCode(byte);
        });
        return btoa(binary);
      }

      async function getFontDataUri() {
        if (!fontDataUriPromise) {
          fontDataUriPromise = fetch(FONT_URL)
            .then((response) => {
              if (!response.ok) throw new Error("Font download failed");
              return response.arrayBuffer();
            })
            .then((buffer) => `data:font/ttf;base64,${arrayBufferToBase64(buffer)}`);
        }
        return fontDataUriPromise;
      }

      async function exportFontPng() {
        const text = fontModal.input.value;
        if (!text) return;
        setExportDisabled(true);
        fontModal.status.textContent = "Rendering / 正在生成";
        const { lines, logicalWidth, logicalHeight, firstBaseline } = await getExportMetrics(text);
        const canvas = document.createElement("canvas");
        canvas.width = logicalWidth * EXPORT_SCALE;
        canvas.height = logicalHeight * EXPORT_SCALE;
        const context = canvas.getContext("2d");
        context.scale(EXPORT_SCALE, EXPORT_SCALE);
        context.clearRect(0, 0, logicalWidth, logicalHeight);
        context.fillStyle = "#000000";
        context.font = `${FONT_SIZE}px "${FONT_FAMILY}"`;
        context.textBaseline = "alphabetic";
        lines.forEach((line, index) => {
          context.fillText(line, EXPORT_PADDING, firstBaseline + index * LINE_HEIGHT);
        });
        const blob = await new Promise((resolve) => canvas.toBlob(resolve, "image/png"));
        if (!blob) throw new Error("PNG export failed");
        downloadBlob(blob, safeFilename(text, "png"));
        fontModal.status.textContent = `${canvas.width} × ${canvas.height}px · Transparent / 透明背景`;
        setExportDisabled(false);
      }

      async function exportFontSvg() {
        const text = fontModal.input.value;
        if (!text) return;
        setExportDisabled(true);
        fontModal.status.textContent = "Rendering SVG / 正在生成 SVG";
        const [{ lines, logicalWidth, logicalHeight, firstBaseline }, fontDataUri] = await Promise.all([
          getExportMetrics(text),
          getFontDataUri()
        ]);
        const tspans = lines
          .map((line, index) => {
            const y = firstBaseline + index * LINE_HEIGHT;
            const value = line.length > 0 ? escapeXml(line) : "&#160;";
            return `<tspan x="${EXPORT_PADDING}" y="${y}" xml:space="preserve">${value}</tspan>`;
          })
          .join("\n    ");
        const svg = `<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="${logicalWidth}" height="${logicalHeight}" viewBox="0 0 ${logicalWidth} ${logicalHeight}">
  <defs>
    <style>
      @font-face {
        font-family: "${FONT_FAMILY}";
        src: url("${fontDataUri}") format("truetype");
      }
    </style>
  </defs>
  <text fill="#000000" font-family="${FONT_FAMILY}" font-size="${FONT_SIZE}" dominant-baseline="alphabetic">
    ${tspans}
  </text>
</svg>
`;
        downloadBlob(new Blob([svg], { type: "image/svg+xml;charset=utf-8" }), safeFilename(text, "svg"));
        fontModal.status.textContent = `${logicalWidth} × ${logicalHeight}px · SVG / 矢量文件`;
        setExportDisabled(false);
      }

      detail.section.addEventListener("click", closeOverlay);
      fontModal.close.addEventListener("click", closeFontModal);
      fontModal.input.addEventListener("input", updateFontButtons);
      fontModal.exportPng.addEventListener("click", async () => {
        try {
          await exportFontPng();
        } catch (error) {
          fontModal.status.textContent = "Export failed / 导出失败";
          setExportDisabled(false);
          console.error(error);
        }
      });
      fontModal.exportSvg.addEventListener("click", async () => {
        try {
          await exportFontSvg();
        } catch (error) {
          fontModal.status.textContent = "SVG export failed / SVG 导出失败";
          setExportDisabled(false);
          console.error(error);
        }
      });

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") {
          closeOverlay();
          closeFontModal();
        }
      });

      entries.forEach((entry) => lattice.appendChild(renderTile(entry)));
      lattice.appendChild(renderFooter());
      const spacer = document.createElement("div");
      spacer.className = "lattice-spacer";
      lattice.appendChild(spacer);

      const hashGlyph = location.hash.replace("#alphabet-", "");
      const initialEntry = entries.find(([glyph]) => glyph === hashGlyph) || entries[0];
      selectEntry(initialEntry, false);
      updateFontButtons();
    </script>
  </body>
</html>

<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="760" viewBox="0 0 1800 760">
  <defs>
    <style>
      .paper { fill: #f3efe4; }
      .line { fill: none; stroke: #7b7c73; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; }
      .thin { fill: none; stroke: #9a998f; stroke-width: 1.35; stroke-linecap: round; stroke-linejoin: round; }
      .hair { fill: none; stroke: #aaa89d; stroke-width: 0.85; stroke-linecap: round; stroke-linejoin: round; }
      .body { fill: #172a4d; opacity: 0.1; stroke: none; }
      .glass { fill: #111; opacity: 0.08; stroke: none; }
      .shadow { fill: #77786f; opacity: 0.12; }
      .sticker { fill: #111; }
      .silver { fill: #c9cbc7; stroke: #222; stroke-width: 0.7; }
      .call { fill: #f3efe4; stroke: #242520; stroke-width: 1.3; }
      .dash { fill: none; stroke: #8f8e84; stroke-width: 1.2; stroke-dasharray: 6 7; stroke-linecap: round; }
      .dim { fill: none; stroke: #2d2d28; stroke-width: 1.1; marker-start: url(#arrow); marker-end: url(#arrow); }
      .title { font: 500 30px Arial, sans-serif; fill: #111; letter-spacing: 0; }
      .label { font: 700 15px Arial, sans-serif; fill: #111; letter-spacing: 0; }
      .small { font: 13px Arial, sans-serif; fill: #4f504b; }
      .micro { font: 10.5px Arial, sans-serif; fill: #5b5b55; }
      .num { font: 700 16px Arial, sans-serif; fill: #111; text-anchor: middle; dominant-baseline: central; }
    </style>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="4.5" refY="4.5" orient="auto-start-reverse">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#2d2d28"/>
    </marker>

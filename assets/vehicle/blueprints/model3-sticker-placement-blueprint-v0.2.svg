<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="2400" viewBox="0 0 1600 2400">
  <defs>
    <style>
      .paper { fill: #f2efe5; }
      .ink { fill: #111; }
      .line { fill: none; stroke: #77786f; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
      .thin { fill: none; stroke: #9a998f; stroke-width: 1.2; stroke-linecap: round; stroke-linejoin: round; }
      .dash { fill: none; stroke: #9a998f; stroke-width: 1.3; stroke-dasharray: 7 8; stroke-linecap: round; }
      .dim { fill: none; stroke: #333; stroke-width: 1.4; marker-start: url(#arrow); marker-end: url(#arrow); }
      .call { fill: #f2efe5; stroke: #222; stroke-width: 1.4; }
      .calltext { font: 700 18px Arial, sans-serif; fill: #111; text-anchor: middle; dominant-baseline: central; }
      .small { font: 14px Arial, sans-serif; fill: #565650; }
      .micro { font: 11px Arial, sans-serif; fill: #565650; }
      .label { font: 700 16px Arial, sans-serif; fill: #111; letter-spacing: 0; }
      .title { font: 500 38px Arial, sans-serif; fill: #111; letter-spacing: 0; }
      .subtitle { font: 16px Arial, sans-serif; fill: #565650; }
      .tableHead { font: 700 13px Arial, sans-serif; fill: #111; }
      .tableText { font: 12px Arial, sans-serif; fill: #333; }
      .sticker { fill: #111; }
      .silver { fill: #c9cbc7; stroke: #222; stroke-width: 1; }
      .blue { fill: #172a4d; }
      .bodyblue { fill: #172a4d; opacity: 0.14; stroke: none; }
      .glass { fill: #111; opacity: 0.08; stroke: none; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#333"/>
    </marker>
  </defs>

  <rect class="paper" width="1600" height="2400"/>

  <g transform="translate(90 70)">
    <text class="title" x="0" y="0">Panacea Vehicle Sticker Measurement Blueprint</text>
    <text class="subtitle" x="0" y="34">Tesla Model 3 RWD base, mainland China purchase Sep 2025, Deep Blue Metallic / V0.2</text>
    <text class="micro" x="0" y="62">All local sticker dimensions are planning values. Field verify on the actual vehicle before vinyl cutting. / 局部贴纸尺寸为规划值，生产前必须实车复测。</text>
  </g>

